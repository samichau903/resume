name: Run TypeScript Script
on: [push]

jobs:
  execute-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23' # Native TS type stripping requires Node 22.18.0+ or Node 23+

      - name: Run script
        run: node --experimental-strip-types src/script.ts
